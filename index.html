<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Вокруг света — многоэкранный вариант</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<link rel="stylesheet" href="vokrug-sveta/styles.css?v=31">
</head>
<body>
<div id="root"></div>

<!-- Telegram Mini App SDK (безопасен при запуске вне Telegram — просто no-op) -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
  // ── Telegram конфиг ──────────────────────────────────────────────
  // При деплое замените на имя вашего бота и Mini App:
  window.TG_BOT = 'VokrugSvetaPlay_bot';
  window.TG_APP = 'myapp';
  // ────────────────────────────────────────────────────────────────
  const _tg = window.Telegram?.WebApp;
  if (_tg) { _tg.ready(); _tg.expand(); document.body.classList.add('tg'); }
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  window.PLAYER_COUNT = 4;
  // WS сервер: при деплое замените на wss://your-server.com
  window.WS_URL = 'wss://vokrugsveta-production.up.railway.app';
</script>
<!-- ?v=N — dev cache-busting: при изменении .jsx/.js увеличьте номер версии -->
<script src="vokrug-sveta/board-data.js?v=31"></script>
<script src="vokrug-sveta/engine.js?v=31"></script>
<script type="text/babel" src="vokrug-sveta/Board.jsx?v=31"></script>
<script type="text/babel" src="vokrug-sveta/panels.jsx?v=31"></script>
<script type="text/babel" src="vokrug-sveta/game-full.jsx?v=31"></script>
<script type="text/babel" src="vokrug-sveta/app-tabs.jsx?v=31"></script>

<script type="text/babel">
  function Main() {
    const RootApp = window.RootApp;
    return (
      <div style={{
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        height: '100vh',
        overflow: 'hidden',
        padding: '8px'
      }}>
        <RootApp count={window.PLAYER_COUNT || 4} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Main />);
</script>
</body>
</html>
